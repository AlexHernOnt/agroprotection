<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">

<h:head>

    <title>Añadir Terreno</title>

    <link rel="icon"
          type="image/png"
          href="resources/images/icon.png" />

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        html {
            background-color: #718e5f;
        }

        .header {
            background-color: #597a43;

            width: 100%;
            height: 75px;

            display: flex;
            align-items: center;

            padding: 0 30px;
            box-sizing: border-box;

            color: white;
        }

        .logo {
            height: 75%;
            margin-right: 12px;
        }

        .title {
            font-size: 18px;
            font-weight: 600;
        }

        .main-content {
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .container {
            width: 500px;

            background-color: #f4f4f4;

            padding: 30px;

            border-radius: 10px;

            box-shadow: 0px 4px 10px rgba(0,0,0,0.25);
        }

        .form {
            display: flex;
            flex-direction: column;
        }

        .form label {
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .form input {
            padding: 10px;

            border: none;
            border-radius: 6px;

            font-size: 16px;
        }

        .continue-button {
            margin-top: 25px;
            padding: 10px;

            background-color: #3f5c36;
            color: white;

            border: none;
            border-radius: 6px;

            font-size: 16px;
            cursor: pointer;
        }

    </style>

</h:head>

<h:body>

    <div class="header">

        <h:graphicImage
            library="images"
            name="logo.png"
            styleClass="logo" />

        <span class="title">
            Agro Protection
        </span>

    </div>

    <div class="main-content">

        <div class="container">

            <h1>Añadir terreno</h1>

            <h:form styleClass="form">

                <h:outputLabel for="comunidad" value="Comunidad" />
                <h:inputText id="comunidad"
                             value="#{addTerrenoBean.comunidad}" />

                <h:outputLabel for="hectarias" value="Hectarias" />
                <h:inputText id="hectarias"
                             value="#{addTerrenoBean.hectarias}" />

                <h:outputLabel for="precio" value="Precio" />
                <h:inputText id="precio"
                             value="#{addTerrenoBean.precio}" />

                <h:commandButton value="Continuar"
                                 action="#{addTerrenoBean.continuar}"
                                 styleClass="continue-button" />

            </h:form>

        </div>

    </div>

</h:body>
</html>
