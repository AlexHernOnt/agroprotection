<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
		xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
		xmlns:h="http://xmlns.jcp.org/jsf/html">


<h:head>
    <title>AgroProtection</title>
	
	<style>
		
		html {
		    background-color: #718e5f;
		}
		
		.header {
			background-color: #5c7d48;
		    text-align: left;
		    padding: 10px;
		    font-weight: bold;
		    font-size: 29px;
		}
		
	    .center {
			text-align: center;
		}
			
		.list {
			display: inline-block;
			text-align: left;
			margin-top: 10px;
		}


	</style>
	
</h:head>





<h:body>

	<div class="header">🌾 AgroProteción</div>
	
	<div class="center">	

	    <h2>Bienvenido #{userBean.user.name}</h2>
	
		<h2>Tienes #{userBean.user.hectarias} hectarias contratadas:</h2>
		
		<ui:repeat value="#{userBean.user.terrenos}" var="g">

		    <h2>
		        - #{g.comunidad}, #{g.hectarias} hectarias, #{g.precio}k€.
		    </h2>

		</ui:repeat>
		
	</div>	

	</h:body>
</html>
